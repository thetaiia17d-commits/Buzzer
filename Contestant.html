<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thí sinh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef;
            text-align: center;
            padding: 20px;
            user-select: none;
            margin: 0;
        }

        .login-controls {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        input,
        textarea {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
            font-weight: bold;
            user-select: text;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        textarea {
            width: 80%;
            max-width: 1000px;
            height: 100px;
            resize: none;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .textarea-locked {
            background-color: #333 !important;
            color: #fff !important;
            border: 2px solid #000;
            caret-color: transparent;
            outline: none;
        }

        button {
            cursor: pointer;
            border-radius: 6px;
            color: white;
            border: none;
            font-weight: bold;
            transition: all 0.2s;
        }

        #loginArea {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #gameArea {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            min-height: 300px;
        }

        #btnJoin {
            background: purple;
            color: white;
            font-weight: bold;
            height: 40px;
            padding: 0 20px;
            font-size: 16px;
            margin: 5px;
        }

        #btnJoin:hover {
            background: orange;
        }

        #btnSend,
        #btnBuzz,
        #btnLeave {
            width: 80%;
            max-width: 1000px;
            margin-top: 10px;
            border-radius: 6px;
            display: block;
        }

        #btnSend {
            height: 70px;
            font-size: 25px;
            background: yellow;
            color: black;
        }

        #btnBuzz {
            height: 70px;
            font-size: 25px;
            background: blue;
            color: white;
        }

        #btnLeave {
            height: 70px;
            font-size: 20px;
            background: green !important;
            color: white !important;
            font-weight: bold !important;
            margin-top: 20px;
        }

        #btnLeave:hover {
            background: orange !important;
        }

        .locked {
            background: black !important;
            color: white !important;
            cursor: not-allowed;
            opacity: 1;
        }

        #btnSend:not(.locked):hover,
        #btnBuzz:not(.locked):hover {
            background: orange !important;
            color: white !important;
            font-weight: bold;
        }

        #popupMessage {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: red;
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.5s, top 0.5s;
            font-weight: bold;
            z-index: 1000;
            pointer-events: none;
        }

        .timer-info {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .timer-countdown {
            color: red;
            font-size: 2.5em;
            font-family: monospace;
        }

        .last-answer-box {
            background-color: orange;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            margin: 10px auto;
            width: 80%;
            max-width: 1000px;
            min-height: 24px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1em;
            word-wrap: break-word;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div id="loginArea">
        <h1>Thí sinh</h1>
        <div class="login-controls">
            <input id="roomCode" placeholder="Mã phòng">
            <input id="name" placeholder="Tên của bạn">
            <input id="positionInput" type="number" placeholder="Vị trí (Optional)" min="1" max="100"
                style="width: 150px;">
            <button id="btnJoin">Xác nhận</button>
        </div>
    </div>

    <div id="gameArea">
        <div class="timer-info">Thời gian gửi đáp án: <span id="answerCountdown" class="timer-countdown">--.--s</span>
        </div>
        <div class="timer-info">Thời gian bấm chuông: <span id="buzzCountdown" class="timer-countdown">--.--s</span>
        </div>

        <div id="lastAnswerStatus" class="last-answer-box"></div>

        <textarea id="answer" placeholder="Nhập đáp án..."></textarea>
        <button id="btnSend">Gửi đáp án</button>
        <button id="btnBuzz">Bấm chuông</button>
        <button id="btnLeave">Rời khỏi phòng</button>
    </div>

    <div id="popupMessage"></div>

    <script>
        var SUPABASE_URL = "https://rsvggeknetiacezwvgxy.supabase.co";
        var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzdmdnZWtuZXRpYWNlend2Z3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ0OTI0NzksImV4cCI6MjA4MDA2ODQ3OX0.mkrHJaOA2axmVx8o5M0AOoyiVdmIFyNdQMiQahSvdEU";
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myRoom = "";
        let myName = "";
        let lockedAnswer = true;
        let lockedBuzz = true;
        let hasBuzzed = false;
        let answerInterval = null;
        let buzzInterval = null;
        let roomChannel = null;
        let serverTimeOffset = 0;
        let serverAnswerOpenTime = 0;
        let serverBuzzOpenTime = 0;
        let localAnswerReceiveTime = 0;
        let localBuzzReceiveTime = 0;
        let lastAnswerResetAt = null;
        let lastBuzzResetAt = null;
        let currentAnswerStartTime = 0;
        let currentBuzzStartTime = 0;
        let isBuzzOpen = false;
        let myBuzzId = null;
        let buzzSingleMode = 0;
        let anyoneBuzzed = false;
        const loginArea = document.getElementById("loginArea");
        const gameArea = document.getElementById("gameArea");
        const lastAnswerStatus = document.getElementById("lastAnswerStatus");
        const answerInput = document.getElementById("answer");
        const btnSend = document.getElementById("btnSend");
        const btnBuzz = document.getElementById("btnBuzz");
        const btnLeave = document.getElementById("btnLeave");
        const buzzSound = new Audio("buzzer.mp3");

        function showPopup(msg, isError = false) {
            const p = document.getElementById("popupMessage");
            p.innerText = msg;
            p.style.backgroundColor = isError ? "red" : "orange";
            p.style.opacity = "1";
            p.style.top = "50px";
            setTimeout(() => {
                p.style.opacity = "0";
                p.style.top = "20px";
            }, 2000);
        }

        function formatTimeDisplay(isoDate, startTimeMs) {
            if (!startTimeMs || !isoDate) return "0.000s";
            const ts = new Date(isoDate).getTime();
            let diff = ts - startTimeMs;
            return (Math.max(0, diff) / 1000).toFixed(3) + "s";
        }

        async function syncServerTime() {
            const tempName = "SYNC_" + Math.random().toString(36).substring(7);
            const t0 = Date.now();
            const { data } = await supabase.from('participants').insert([{ room_code: myRoom, name: tempName, role: 'contestant' }]).select().maybeSingle();
            const t1 = Date.now();
            if (data) {
                const serverTs = new Date(data.created_at).getTime();
                const rtt = t1 - t0;
                const estimatedLocalAtServerTs = t0 + Math.round(rtt / 2);
                serverTimeOffset = serverTs - estimatedLocalAtServerTs;
                await supabase.from('participants').delete().eq('id', data.id);
            }
        }

        function updateAnswerUI(isLocked) {
            lockedAnswer = isLocked;
            btnSend.disabled = isLocked;
            answerInput.readOnly = isLocked;
            if (isLocked) {
                btnSend.classList.add("locked");
                answerInput.classList.add("textarea-locked");
            } else {
                btnSend.classList.remove("locked");
                answerInput.classList.remove("textarea-locked");
                setTimeout(() => answerInput.focus(), 50);
            }
        }

        function updateBuzzUI(shouldLock) {
            lockedBuzz = shouldLock;
            
            // CHỈNH SỬA: Phải kiểm tra thêm isBuzzOpen để tránh việc nút mở sáng lên khi Host đang khóa phòng
            if (!shouldLock && !hasBuzzed && isBuzzOpen) {
                btnBuzz.classList.remove("locked");
                btnBuzz.innerText = "Bấm chuông";
            } else {
                btnBuzz.classList.add("locked");
                if (hasBuzzed) {
                    btnBuzz.innerText = "Đã bấm chuông";
                } else {
                    btnBuzz.innerText = "Đang khóa";
                }
            }
        }

        function startTimer(elementId, endTime, onEnd) {
            const el = document.getElementById(elementId);
            if (elementId === 'answerCountdown') {
                if (answerInterval) clearInterval(answerInterval);
            } else {
                if (buzzInterval) clearInterval(buzzInterval);
            }

            const now = Date.now() + serverTimeOffset;
            if (!endTime || endTime <= now) {
                el.innerText = "0.000s";
                if (onEnd) onEnd();
                return;
            }

            const timer = setInterval(() => {
                const remain = endTime - (Date.now() + serverTimeOffset);
                if (remain <= 0) {
                    el.innerText = "0.000s";
                    clearInterval(timer);
                    if (elementId === 'answerCountdown') answerInterval = null;
                    if (elementId === 'buzzCountdown') buzzInterval = null;
                    if (onEnd) onEnd();
                } else {
                    el.innerText = (remain / 1000).toFixed(3) + "s";
                }
            }, 30);

            if (elementId === 'answerCountdown') answerInterval = timer;
            else buzzInterval = timer;
        }

        document.getElementById("btnJoin").onclick = async () => {
            const code = document.getElementById("roomCode").value.trim();
            const name = document.getElementById("name").value.trim();
            const pos = document.getElementById("positionInput").value.trim();

            if (!code || !name) return showPopup("Vui lòng nhập đủ thông tin", true);

            const { data: room } = await supabase.from('rooms').select('*').eq('room_code', code).maybeSingle();
            if (!room) return showPopup("Phòng không tồn tại", true);

            myRoom = code;
            myName = name;

            const posValue = pos === "" ? null : parseInt(pos);
            await supabase.from('participants').upsert([{ room_code: myRoom, name: myName, role: 'contestant', position: posValue }]);

            gameArea.style.display = "flex";
            loginArea.style.display = "none";

            await syncServerTime();
            handleRoomUpdate(room);
            subscribeRealtime();
        };

        btnSend.onclick = async () => {
            if (lockedAnswer) return;
            const text = answerInput.value.trim();
            if (!text) return showPopup("Chưa nhập đáp án", true);

            btnSend.disabled = true;
            // Dùng thời gian máy chủ đã đồng bộ tuyệt đối để tránh sai số
            const finalISO = new Date(Date.now() + serverTimeOffset).toISOString();

            const { error } = await supabase.from('answers').insert([{ room_code: myRoom, name: myName, answer_text: text, created_at: finalISO }]);
            if (!error) {
                lastAnswerStatus.innerText = `Bạn đã trả lời: "${text}" ở ${formatTimeDisplay(finalISO, currentAnswerStartTime)}`;
                answerInput.value = "";
                showPopup("Đã gửi!");
            }
            btnSend.disabled = false;
        };

        btnBuzz.onclick = async () => {
            if (lockedBuzz || hasBuzzed || (buzzSingleMode === 1 && anyoneBuzzed)) return;
            hasBuzzed = true;
            updateBuzzUI(true);

            const nowServer = new Date(Date.now() + serverTimeOffset);
            const pressTimeISO = nowServer.toISOString();

            const { data, error } = await supabase.from('buzzes').insert([{
                room_code: myRoom,
                name: myName,
                press_time: pressTimeISO
            }]).select();

            if (error) {
                hasBuzzed = false;
                updateBuzzUI(false);
                showPopup("Lỗi bấm chuông", true);
            } else if (data && data.length > 0) {
                // BỔ SUNG: Gán ID chuông để hệ thống nhận diện đúng khi Host xóa lẻ từng người
                myBuzzId = data[0].id;
                
                if (buzzSingleMode === 1) {
                    lockedBuzz = true;
                    updateBuzzUI(true);
                    anyoneBuzzed = true;
                    await supabase.from('rooms').update({ buzz_status: 'locked' }).eq('room_code', myRoom);
                }
            }
        };

        btnLeave.onclick = async () => {
            if (myRoom && myName) {
                await supabase.from("participants").delete().eq("room_code", myRoom).eq("name", myName);
            }

            if (roomChannel) {
                supabase.removeChannel(roomChannel);
                roomChannel = null;
            }

            myRoom = "";
            myName = "";
            gameArea.style.display = "none";
            loginArea.style.display = "flex";
            lastAnswerStatus.innerText = "";
            answerInput.value = "";
            document.getElementById('answerCountdown').innerText = "--.--s";
            document.getElementById('buzzCountdown').innerText = "--.--s";

            showPopup("Đã rời phòng!");
        };

        function subscribeRealtime() {
            roomChannel = supabase.channel('room-' + myRoom)
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `room_code=eq.${myRoom}` }, payload => handleRoomUpdate(payload.new))
                .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'answers', filter: `room_code=eq.${myRoom}` }, () => {
                    lastAnswerStatus.innerText = "";
                    showPopup("Host đã Reset đáp án!");
                })
                .on('postgres_changes', {
                    event: 'DELETE',
                    schema: 'public',
                    table: 'buzzes',
                    filter: `room_code=eq.${myRoom}`
                }, (payload) => {
                    // 1. Luôn mở khóa rào cản "1 người bấm" cho toàn phòng khi có bất kỳ chuông nào bị xóa
                    lockedBuzz = false;
                    anyoneBuzzed = false;

                    // 2. Nếu chuông bị xóa là của chính thí sinh này
                    if (payload.old && payload.old.id === myBuzzId) {
                        hasBuzzed = false;
                        myBuzzId = null;
                    }

                    // 3. Cập nhật lại UI dựa vào biến isBuzzOpen hiện tại của phòng
                    updateBuzzUI(false);
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'buzzes', filter: `room_code=eq.${myRoom}` }, async (payload) => {
                    // CHỈNH SỬA: Nếu đang ở chế độ 1 người bấm và trước đó ĐÃ CÓ người bấm rồi (lockedBuzz đã bật)
                    // thì hủy bỏ toàn bộ tín hiệu của những người đến sau, không phát âm thanh chuông nữa.
                    if (buzzSingleMode === 1 && lockedBuzz) {
                        return;
                    }

                    buzzSound.play().catch(e => { });
                    anyoneBuzzed = true;

                    if (buzzSingleMode === 1) {
                        lockedBuzz = true;
                        updateBuzzUI(true);
                    }
                })
                .subscribe();
        }

        async function handleRoomUpdate(roomData) {
            if (!roomData) return;

            const oldBuzzMode = buzzSingleMode;

            if (roomData.buzz_mode !== undefined && roomData.buzz_mode !== null) {
                buzzSingleMode = parseInt(roomData.buzz_mode);
            }

            if (roomData.answer_reset_at !== lastAnswerResetAt) {
                lastAnswerResetAt = roomData.answer_reset_at;
                lastAnswerStatus.innerText = "";
            }
            if (roomData.buzz_reset_at !== lastBuzzResetAt) {
                lastBuzzResetAt = roomData.buzz_reset_at;
                hasBuzzed = false;
                anyoneBuzzed = false;
                currentBuzzStartTime = 0;
                lockedBuzz = false;
                updateBuzzUI(false);
            }

            const isAnswerOpen = (roomData.answer_status === 'open');
            if (isAnswerOpen && roomData.answer_open_time) {
                const startTime = new Date(roomData.answer_open_time).getTime();
                const endTime = startTime + ((roomData.answer_duration || 0) * 1000);
                if (currentAnswerStartTime !== startTime) {
                    currentAnswerStartTime = startTime;
                    serverAnswerOpenTime = startTime;
                    localAnswerReceiveTime = performance.now();
                    updateAnswerUI(false);
                    if (roomData.answer_duration > 0) {
                        startTimer('answerCountdown', endTime, () => updateAnswerUI(true));
                    } else {
                        document.getElementById('answerCountdown').innerText = "Đang mở (Không giới hạn)";
                    }
                } else if (roomData.answer_duration > 0 && Date.now() + serverTimeOffset >= endTime) {
                    updateAnswerUI(true);
                    if (answerInterval) { clearInterval(answerInterval); answerInterval = null; }
                    document.getElementById('answerCountdown').innerText = "0.000s";
                }
            } else {
                updateAnswerUI(true);
                if (answerInterval) {
                    clearInterval(answerInterval);
                    answerInterval = null;
                }
                currentAnswerStartTime = 0;
                document.getElementById('answerCountdown').innerText = "--.--s";
            }

            isBuzzOpen = (roomData.buzz_status === 'open');
            if (isBuzzOpen && roomData.buzz_open_time) {
                const startTime = new Date(roomData.buzz_open_time).getTime();

                if (buzzSingleMode === 1 && currentBuzzStartTime !== startTime) {
                    anyoneBuzzed = false;
                }

                if (buzzSingleMode === 1 && anyoneBuzzed) {
                    updateBuzzUI(true);
                    if (buzzInterval) { clearInterval(buzzInterval); buzzInterval = null; }
                    document.getElementById('buzzCountdown').innerText = "0.000s";
                    return;
                }

                if (oldBuzzMode === 1 && buzzSingleMode === 0 && anyoneBuzzed && !hasBuzzed) {
                    anyoneBuzzed = false;
                    hasBuzzed = false;
                    updateBuzzUI(false);
                }

                const endTime = startTime + ((roomData.buzz_duration || 0) * 1000);
                if (currentBuzzStartTime !== startTime) {
                    currentBuzzStartTime = startTime;
                    serverBuzzOpenTime = startTime;
                    localBuzzReceiveTime = performance.now();
                    updateBuzzUI(false);
                    if (roomData.buzz_duration > 0) {
                        startTimer('buzzCountdown', endTime, () => updateBuzzUI(true));
                    } else {
                        document.getElementById('buzzCountdown').innerText = "Đang mở (Không giới hạn)";
                    }
                } else {
                    if (roomData.buzz_duration > 0) {
                        const now = Date.now() + serverTimeOffset;
                        if (now < endTime) {
                            updateBuzzUI(false);
                            startTimer('buzzCountdown', endTime, () => updateBuzzUI(true));
                        } else {
                            updateBuzzUI(true);
                            if (buzzInterval) { clearInterval(buzzInterval); buzzInterval = null; }
                            document.getElementById('buzzCountdown').innerText = "0.000s";
                        }
                    } else {
                        updateBuzzUI(false);
                        document.getElementById('buzzCountdown').innerText = "Đang mở (Không giới hạn)";
                    }
                }
            } else {
                updateBuzzUI(true);
                if (buzzInterval) {
                    clearInterval(buzzInterval);
                    buzzInterval = null;
                }
                currentBuzzStartTime = 0;
                document.getElementById('buzzCountdown').innerText = "--.--s";
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && document.activeElement === answerInput) {
                e.preventDefault();
                btnSend.click();
            }
            if (e.key === 'Control') {
                e.preventDefault();
                btnBuzz.click();
            }
        });

        window.addEventListener("beforeunload", async () => {
            if (myRoom && myName) {
                await supabase.from("participants").delete().eq("room_code", myRoom).eq("name", myName);
            }
        });

        answerInput.addEventListener('input', function () {
            this.value = this.value.toUpperCase();
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123) e.preventDefault();
            if ((e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
            }
        });
    </script>
</body>

</html>
