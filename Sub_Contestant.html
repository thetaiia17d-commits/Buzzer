<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thí sinh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef;
            text-align: center;
            padding: 10px;
            user-select: none;
            margin: 0;
        }

        #loginArea {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 100px;
            transition: all 0.3s ease;
        }

        input,
        textarea,
        button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        #gameArea {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin: 50px auto 0 auto;
        }

        .timer-container {
            width: 95%;
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        .timer-info {
            font-weight: bold;
            font-size: 24px;
        }

        .timer-countdown {
            color: red;
            font-size: 35px;
            font-family: monospace;
            display: block;
        }

        #answerStatusBox {
            width: 95% !important;
            min-height: 40px;
            background: orange;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
            word-wrap: break-word;
        }

        .input-row {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 5px;
            margin-bottom: 15px;
            width: 95%;
        }

        #answer {
            flex: 1;
            height: 80px;
            font-size: 20px;
            margin: 0;
            box-sizing: border-box;
            text-align: left;
            resize: none;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
        }

        #btnSend {
            width: 200px;
            background: yellow;
            color: black;
            font-size: 20px;
            margin: 0;
            cursor: pointer;
            box-sizing: border-box;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btnSend:hover {
            background: orange;
            color: white
        }

        #btnBuzz {
            width: 95% !important;
            height: 80px;
            background: blue;
            color: white;
            font-size: 20px;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px #00008b;
            box-sizing: border-box;
        }

        #btnBuzz:hover {
            background-color: orange;
        }

        #btnBuzz:active {
            box-shadow: 0 2px #00008b;
            transform: translateY(4px);
        }

        #btnLeave {
            width: 95% !important;
            height: 50px;
            background: green;
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            box-shadow: 0 4px #1e7e34;
            box-sizing: border-box;
        }

        #btnLeave:hover {
            background-color: orange;
        }

        .locked {
            background: #555 !important;
            color: #ccc !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }

        .input-locked {
            background: #333;
            color: white;
            border: 1px solid #000;
        }

        h3 {
            margin-top: 25px;
            margin-bottom: 10px;
            color: #333;
        }

        table {
            width: 95% !important;
            border-collapse: collapse;
            margin-top: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        table,
        th,
        td {
            border: 1px solid #aaa;
        }

        #tblBuzz th {
            background: purple;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 10px;
        }

        #tblBuzz td {
            font-weight: bold;
            text-align: center;
            padding: 8px;
        }

        #popupMessage {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: orange;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.5s, top 0.5s;
            font-weight: bold;
            z-index: 1000;
            pointer-events: none;
        }

        .success-popup {
            background-color: orange !important;
        }

        #btnJoin {
            background: purple;
            color: white;
            font-weight: bold;
            width: 200px;
        }

        #btnJoin:hover {
            background: orange;
            color: white;
            font-weight: bold;
            width: 200px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div id="loginArea">
        <h1>Thí sinh</h1>
        <input id="roomCode" placeholder="Mã phòng (6 số)" type="text">
        <input id="name" placeholder="Tên của bạn">
        <input id="positionInput" type="number" placeholder="Vị trí đứng (1-100)" min="1" max="100"
            style="width: 250px; font-weight: bold;">
        <button id="btnJoin">Xác nhận vào phòng</button>
    </div>

    <div id="gameArea">
        <div class="timer-container">
            <div class="timer-info">Đáp án: <span id="answerCountdown" class="timer-countdown">--.--s</span></div>
            <div class="timer-info">Chuông: <span id="buzzCountdown" class="timer-countdown">--.--s</span></div>
        </div>

        <div id="answerStatusBox"></div>

        <div class="input-row">
            <textarea id="answer" placeholder="Nhập đáp án..."></textarea>
            <button id="btnSend">Gửi</button>
        </div>

        <button id="btnBuzz">Bấm chuông</button>

        <button id="btnLeave">Rời khỏi phòng</button>

        <h3>Thứ tự bấm chuông</h3>
        <table id="tblBuzz">
            <thead>
                <tr>
                    <th style="width: 30%;">Tên</th>
                    <th style="width: 25%;">Thời gian bấm</th>
                    <th style="width: 25%;">Độ trễ</th>
                    <th style="width: 20%;">Thời gian tổng</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <div id="popupMessage"></div>

    <script>
        var SUPABASE_URL = "https://rsvggeknetiacezwvgxy.supabase.co";
        var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzdmdnZWtuZXRpYWNlend2Z3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ0OTI0NzksImV4cCI6MjA4MDA2ODQ3OX0.mkrHJaOA2axmVx8o5M0AOoyiVdmIFyNdQMiQahSvdEU";
        var supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myRoom = "";
        let myName = "";
        let lockedAnswer = true;
        let lockedBuzz = true;
        let hasBuzzed = false;
        let answerInterval = null;
        let buzzInterval = null;
        let roomChannel = null;
        let buzzesChannel = null;
        let serverTimeOffset = 0;
        let currentBuzzStartTime = 0;
        let currentAnswerStartTime = 0;
        let buzzOrder = [];
        let lastAnswerResetAt = null;
        let lastBuzzResetAt = null;
        let buzzSingleMode = 0;
        let anyoneBuzzed = false;
        let isResettingBuzz = false;
        let isBuzzOpen = false;
        let myBuzzId = null;
        let localAnswerReceiveTime = 0;
        let localBuzzReceiveTime = 0;
        let serverAnswerOpenTime = 0;
        let serverBuzzOpenTime = 0;

        const loginArea = document.getElementById("loginArea");
        const gameArea = document.getElementById("gameArea");
        const roomCodeInput = document.getElementById("roomCode");
        const nameInput = document.getElementById("name");
        const btnJoin = document.getElementById("btnJoin");
        const btnSend = document.getElementById("btnSend");
        const btnLeave = document.getElementById("btnLeave");
        const answerInput = document.getElementById("answer");
        const answerStatusBox = document.getElementById("answerStatusBox");
        const btnBuzz = document.getElementById("btnBuzz");
        const tblBuzzBody = document.querySelector("#tblBuzz tbody");
        const buzzSound = new Audio("buzzer.mp3");

        function safeParseUTC(dateStr) {
            if (!dateStr) return 0;
            let s = String(dateStr).trim();
            s = s.replace(' ', 'T');
            if (!s.endsWith('Z') && !s.includes('+') && !s.match(/-\d{2}:\d{2}$/)) {
                s += 'Z';
            }
            const t = new Date(s).getTime();
            return isNaN(t) ? 0 : t;
        }

        function showPopup(msg, type = "success") {
            const p = document.getElementById("popupMessage");
            p.innerText = msg;
            p.className = type === "error" ? "" : "success-popup";
            p.style.opacity = "1";
            p.style.top = "50px";
            setTimeout(() => {
                p.style.opacity = "0";
                p.style.top = "20px";
            }, 2000);
        }

        function getServerTimeNow() { return Date.now() + serverTimeOffset; }

        async function syncServerTime() {
            const roomCode = myRoom;
            if (!roomCode) return;
            
            let bestOffset = null;
            let minRtt = Infinity;
            
            // Thực hiện đo 3 lần liên tiếp để tìm RTT thấp nhất, triệt tiêu sai số do mạng và DB xử lý
            for (let i = 0; i < 3; i++) {
                const tempName = "SYNC_TIME_" + Math.random().toString(36).substring(7);
                const t0 = Date.now();
                try {
                    const { data, error } = await supabase.from('participants')
                        .insert([{ room_code: roomCode, name: tempName, role: 'contestant' }])
                        .select()
                        .maybeSingle();
                    const t1 = Date.now();
                    
                    if (data && !error) {
                        const serverTs = safeParseUTC(data.created_at);
                        const rtt = t1 - t0;
                        if (rtt < minRtt) {
                            minRtt = rtt;
                            const estimatedLocalAtServerTs = t0 + Math.round(rtt / 2);
                            bestOffset = serverTs - estimatedLocalAtServerTs;
                        }
                        // Xóa bản ghi rác ngay lập tức
                        await supabase.from('participants').delete().eq('id', data.id);
                    }
                } catch (e) {
                    console.error("Đo đồng bộ thời gian lỗi lần " + (i + 1), e);
                }
                // Chờ nhẹ 50ms giữa các lần đo để tránh nghẽn
                await new Promise(resolve => setTimeout(resolve, 50));
            }
            
            if (bestOffset !== null) {
                serverTimeOffset = bestOffset;
                console.log("Đồng bộ thời gian thành công! Offset:", serverTimeOffset, "RTT:", minRtt, "ms");
            }
        }

        // Chạy đồng bộ thời gian liên tục mỗi 25 giây khi đã vào phòng
        setInterval(async () => {
            if (myRoom) {
                await syncServerTime();
            }
        }, 25000);

        function formatTimeDisplay(isoDate, startTimeMs) {
            if (!startTimeMs || !isoDate) return "0.000s";
            const ts = safeParseUTC(isoDate);
            let diff = ts - startTimeMs;
            if (diff < 0) diff = 0;
            return (diff / 1000).toFixed(3) + "s";
        }

        function updateAnswerUI(isLocked) {
            lockedAnswer = isLocked;
            btnSend.disabled = isLocked;
            answerInput.readOnly = isLocked;
            if (isLocked) {
                btnSend.classList.add("locked");
                answerInput.classList.add("input-locked");
            } else {
                btnSend.classList.remove("locked");
                answerInput.classList.remove("input-locked");
                setTimeout(() => { answerInput.focus(); }, 10);
            }
        }

        function resetAnswerStatusBox() {
            answerStatusBox.innerText = "";
            answerStatusBox.innerHTML = "";
            answerStatusBox.style.display = "block";
            answerInput.value = "";
        }

        function updateBuzzUI(shouldLock) {
            lockedBuzz = shouldLock;
            
            if (!shouldLock && !hasBuzzed && isBuzzOpen) {
                btnBuzz.classList.remove("locked");
                btnBuzz.innerText = "Bấm chuông";
            } else {
                btnBuzz.classList.add("locked");
                if (hasBuzzed) {
                    btnBuzz.innerText = "Đã bấm chuông";
                } else {
                    btnBuzz.innerText = "Đang khóa";
                }
            }
        }

        function renderBuzzTable() {
            tblBuzzBody.innerHTML = "";
            if (!buzzOrder || buzzOrder.length === 0) return;

            const sorted = [...buzzOrder].sort((a, b) => safeParseUTC(a.created_at) - safeParseUTC(b.created_at));
            const displayBuzz = (buzzSingleMode === 1 && sorted.length > 0) ? [sorted[0]] : sorted;

            displayBuzz.forEach(item => {
                const row = tblBuzzBody.insertRow();

                const serverReceived = safeParseUTC(item.created_at);
                const clientPressed = safeParseUTC(item.press_time || item.created_at);

                const pressDiff = clientPressed - currentBuzzStartTime;
                const latency = serverReceived - clientPressed;
                const totalDiff = serverReceived - currentBuzzStartTime;

                const cellName = row.insertCell(0);
                cellName.innerText = item.name;

                row.insertCell(1).innerText = (pressDiff / 1000).toFixed(3) + "s";
                row.insertCell(2).innerText = latency + "ms";

                const cellTotal = row.insertCell(3);
                cellTotal.innerText = (totalDiff / 1000).toFixed(3) + "s";

                if (item.name === myName) {
                    row.style.setProperty('background-color', 'red', 'important');
                    Array.from(row.cells).forEach(cell => {
                        cell.style.setProperty('color', 'white', 'important');
                        cell.style.setProperty('font-weight', 'bold', 'important');
                    });
                } else {
                    row.style.setProperty('background-color', 'white', 'important');
                    Array.from(row.cells).forEach(cell => {
                        cell.style.setProperty('color', 'black', 'important');
                        cell.style.setProperty('font-weight', 'bold', 'important');
                    });
                }
            });
        }

        async function fetchBuzzList() {
            const { data } = await supabase.from('buzzes').select('*').eq('room_code', myRoom);
            if (data && data.length > 0) {
                const sortedData = [...data].sort((a, b) => safeParseUTC(a.created_at) - safeParseUTC(b.created_at));

                if (buzzSingleMode === 1) {
                    buzzOrder = [sortedData[0]];
                    lockedBuzz = true;
                } else {
                    buzzOrder = sortedData;
                }

                if (buzzOrder.some(b => b.name === myName)) {
                    hasBuzzed = true;
                } else {
                    hasBuzzed = false;
                }

                updateBuzzUI(lockedBuzz);
                renderBuzzTable();
            } else {
                buzzOrder = [];
                hasBuzzed = false;
                updateBuzzUI(lockedBuzz);
                renderBuzzTable();
            }
        }

        async function fetchMyLastAnswer() {
            const { data } = await supabase.from('answers').select('*').eq('room_code', myRoom).eq('name', myName).order('created_at', { ascending: false }).limit(1).maybeSingle();
            if (data) {
                const timeDiff = formatTimeDisplay(data.created_at, currentAnswerStartTime);
                answerStatusBox.innerText = `Bạn đã trả lời "${data.answer_text}" ở ${timeDiff}`;
                answerStatusBox.style.display = "block";
            } else {
                resetAnswerStatusBox();
            }
        }

        function startTimer(elementId, endTime, callbackEnd) {
            const el = document.getElementById(elementId);
            if (elementId === 'answerCountdown' && answerInterval) clearInterval(answerInterval);
            if (elementId === 'buzzCountdown' && buzzInterval) clearInterval(buzzInterval);

            const now = Date.now() + serverTimeOffset;
            if (!endTime || endTime <= now) {
                el.innerText = "0.000s";
                if (callbackEnd) callbackEnd();
                return;
            }

            const update = () => {
                const remain = endTime - (Date.now() + serverTimeOffset);
                if (remain <= 0) {
                    el.innerText = "0.000s";
                    if (elementId === 'answerCountdown') { clearInterval(answerInterval); answerInterval = null; }
                    if (elementId === 'buzzCountdown') { clearInterval(buzzInterval); buzzInterval = null; }
                    if (callbackEnd) callbackEnd();
                } else {
                    el.innerText = (remain / 1000).toFixed(3) + "s";
                }
            };
            update();
            const interval = setInterval(update, 30);
            if (elementId === 'answerCountdown') answerInterval = interval;
            if (elementId === 'buzzCountdown') buzzInterval = interval;
        }

        btnJoin.onclick = async () => {
            const codeString = roomCodeInput.value.trim();
            const name = nameInput.value.trim();
            const posInput = document.getElementById("positionInput").value.trim();

            if (!codeString || !name || codeString.length !== 6) {
                return showPopup("Mã phòng hoặc Tên không hợp lệ", "error");
            }

            const code = codeString;

            const { data: room, error: roomError } = await supabase.from('rooms').select('*').eq('room_code', code).maybeSingle();
            if (roomError || !room) return showPopup("Phòng không tồn tại!", "error");

            const posValue = posInput === "" ? null : parseInt(posInput);

            const { error: joinError } = await supabase.from('participants').upsert([{
                room_code: code,
                name: name,
                role: 'contestant',
                position: posValue
            }]);

            if (joinError) return showPopup("Lỗi tham gia", "error");

            myRoom = code;
            myName = name;
            loginArea.style.display = "none";
            gameArea.style.display = "flex";
            answerStatusBox.style.display = "block";
            resetAnswerStatusBox();

            await syncServerTime();
            await fetchBuzzList();
            handleRoomUpdate(room);
            subscribeRealtime();
        };

        btnLeave.onclick = async () => {
            if (myRoom && myName) {
                await supabase.from("participants").delete().eq("room_code", myRoom).eq("name", myName);
            }

            if (roomChannel) supabase.removeChannel(roomChannel);
            if (buzzesChannel) supabase.removeChannel(buzzesChannel);

            myRoom = "";
            myName = "";
            hasBuzzed = false;
            buzzOrder = [];

            gameArea.style.display = "none";
            loginArea.style.display = "flex";

            showPopup("Đã rời khỏi phòng!");
        };

        btnSend.onclick = async () => {
            if (lockedAnswer) return showPopup("Đang khóa!", "error");
            const text = answerInput.value.trim();
            if (!text) { answerInput.focus(); return showPopup("Chưa nhập đáp án!", "error"); }
            btnSend.disabled = true;

            const { data, error } = await supabase.from('answers').insert([
                { room_code: myRoom, name: myName, answer_text: text }
            ]).select();

            if (!error && data && data.length > 0) {
                const serverCreatedAt = data[0].created_at;
                const timeDiff = formatTimeDisplay(serverCreatedAt, currentAnswerStartTime);
                answerStatusBox.innerText = `Bạn đã trả lời "${text}" ở ${timeDiff}`;
                answerInput.value = ""; showPopup("Đã gửi đáp án!");
                setTimeout(() => { if (!lockedAnswer) btnSend.disabled = false; }, 500);
            } else {
                showPopup("Lỗi gửi đáp án", "error");
                btnSend.disabled = false;
            }
            answerInput.focus();
        };

        btnBuzz.onclick = async () => {
            if (lockedBuzz || hasBuzzed || !myRoom || !myName || (buzzSingleMode === 1 && anyoneBuzzed)) return;
            hasBuzzed = true;
            btnBuzz.classList.add("locked");

            const pressTimeISO = new Date(Date.now() + serverTimeOffset).toISOString();

            const { data, error } = await supabase.from('buzzes').insert([{
                room_code: myRoom,
                name: myName,
                press_time: pressTimeISO
            }]).select();

            if (error) {
                hasBuzzed = false;
                updateBuzzUI(false);
                showPopup("Lỗi bấm chuông", "error");
            } else if (data && data.length > 0) {
                myBuzzId = data[0].id;
                
                buzzSound.play().catch(e => { });
                
                if (buzzSingleMode === 1) {
                    lockedBuzz = true;
                    updateBuzzUI(true);
                    anyoneBuzzed = true;
                    await supabase.from('rooms').update({ buzz_status: 'locked' }).eq('room_code', myRoom);
                }
            }
        };

        function subscribeRealtime() {
            if (roomChannel) supabase.removeChannel(roomChannel);
            if (buzzesChannel) supabase.removeChannel(buzzesChannel);

            roomChannel = supabase.channel('room-' + myRoom);
            roomChannel.on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `room_code=eq.${myRoom}` }, async (payload) => { handleRoomUpdate(payload.new); })
                .on('postgres_changes', {
                    event: 'DELETE',
                    schema: 'public',
                    table: 'answers',
                    filter: `room_code=eq.${myRoom}`
                }, () => {
                    resetAnswerStatusBox();
                    showPopup("Host đã Reset đáp án!");
                })
                .on('postgres_changes', {
                    event: 'DELETE',
                    schema: 'public',
                    table: 'buzzes',
                    filter: `room_code=eq.${myRoom}`
                }, (payload) => {
                    lockedBuzz = false;
                    anyoneBuzzed = false;

                    if (payload.old && payload.old.id === myBuzzId) {
                        hasBuzzed = false;
                        myBuzzId = null;
                    }

                    if (typeof fetchBuzzList === "function") {
                        fetchBuzzList();
                    } else {
                        if (typeof updateBuzzUI === "function") updateBuzzUI(false);
                        if (typeof renderBuzzTable === "function") renderBuzzTable();
                    }
                })
                .subscribe();

            buzzesChannel = supabase.channel('buzzes-list')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'buzzes',
                    filter: `room_code=eq.${myRoom}`
                }, async (payload) => {
                    if (buzzSingleMode === 1 && buzzOrder && buzzOrder.length > 0) {
                        return;
                    }

                    if (typeof fetchBuzzList === "function") await fetchBuzzList();
                    buzzSound.play().catch(e => { });

                    if (buzzSingleMode === 1) {
                        lockedBuzz = true;
                        updateBuzzUI(true);
                    }
                })
                .subscribe();
        }

        async function handleRoomUpdate(roomData) {
            if (!roomData) return;

            const oldBuzzMode = buzzSingleMode;

            if (roomData.buzz_mode !== undefined && roomData.buzz_mode !== null) {
                buzzSingleMode = parseInt(roomData.buzz_mode);
            }

            if (roomData.answer_reset_at &&
                roomData.answer_reset_at !== lastAnswerResetAt) {
                lastAnswerResetAt = roomData.answer_reset_at;
                resetAnswerStatusBox();
                showPopup("Đáp án đã được Reset!");
            }

            if (roomData.buzz_reset_at &&
                roomData.buzz_reset_at !== lastBuzzResetAt) {
                lastBuzzResetAt = roomData.buzz_reset_at;
                
                hasBuzzed = false;
                anyoneBuzzed = false;
                currentBuzzStartTime = 0;
                lockedBuzz = false;
                updateBuzzUI(false);
                
                buzzOrder = [];
                renderBuzzTable();
                showPopup("Chuông đã được Reset!");
            }

            const isAnswerOpen = (roomData.answer_status === 'open');
            const answerOpenTimeISO = roomData.answer_open_time;
            const newAnswerStartTime = answerOpenTimeISO ? safeParseUTC(answerOpenTimeISO) : 0;

            if (isAnswerOpen && answerOpenTimeISO) {
                if (currentAnswerStartTime !== newAnswerStartTime) {
                    currentAnswerStartTime = newAnswerStartTime;
                    serverAnswerOpenTime = newAnswerStartTime;
                    localAnswerReceiveTime = performance.now();

                    updateAnswerUI(false);
                    if (roomData.answer_duration > 0) {
                        startTimer(
                            'answerCountdown',
                            newAnswerStartTime + ((roomData.answer_duration || 0) * 1000),
                            () => updateAnswerUI(true)
                        );
                    } else {
                        document.getElementById('answerCountdown').innerText = "Đang mở (Không giới hạn)";
                    }
                    await fetchMyLastAnswer();
                } else if (roomData.answer_duration > 0 && Date.now() + serverTimeOffset >= newAnswerStartTime + ((roomData.answer_duration || 0) * 1000)) {
                    updateAnswerUI(true);
                    if (answerInterval) { clearInterval(answerInterval); answerInterval = null; }
                    document.getElementById('answerCountdown').innerText = "0.000s";
                }
            } else {
                updateAnswerUI(true);
                currentAnswerStartTime = 0;
                if (answerInterval) { clearInterval(answerInterval); answerInterval = null; }
                document.getElementById('answerCountdown').innerText = "--.--s";
            }

            isBuzzOpen = (roomData.buzz_status === 'open');
            const buzzOpenTimeISO = roomData.buzz_open_time;
            const newBuzzStartTime = buzzOpenTimeISO ? safeParseUTC(buzzOpenTimeISO) : 0;

            if (isBuzzOpen && buzzOpenTimeISO) {
                if (currentBuzzStartTime !== newBuzzStartTime) {
                    hasBuzzed = false;
                    anyoneBuzzed = false;
                    currentBuzzStartTime = newBuzzStartTime;
                    serverBuzzOpenTime = newBuzzStartTime;
                    localBuzzReceiveTime = performance.now();

                    updateBuzzUI(false);
                    if (roomData.buzz_duration > 0) {
                        startTimer(
                            'buzzCountdown',
                            newBuzzStartTime + ((roomData.buzz_duration || 0) * 1000),
                            () => updateBuzzUI(true)
                        );
                    } else {
                        document.getElementById('buzzCountdown').innerText = "Đang mở (Không giới hạn)";
                    }
                    await fetchBuzzList();
                } else if (roomData.buzz_duration > 0 && Date.now() + serverTimeOffset >= newBuzzStartTime + ((roomData.buzz_duration || 0) * 1000)) {
                    updateBuzzUI(true);
                    if (buzzInterval) { clearInterval(buzzInterval); buzzInterval = null; }
                    document.getElementById('buzzCountdown').innerText = "0.000s";
                }
                if (oldBuzzMode === 1 && buzzSingleMode === 0 && anyoneBuzzed && !hasBuzzed) {
                    anyoneBuzzed = false;
                    hasBuzzed = false;
                    updateBuzzUI(false);
                    await fetchBuzzList();
                }
            } else {
                updateBuzzUI(true);
                currentBuzzStartTime = 0;
                if (buzzInterval) { clearInterval(buzzInterval); buzzInterval = null; }
                document.getElementById('buzzCountdown').innerText = "--.--s";
                if (!isBuzzOpen) {
                    buzzOrder = [];
                    renderBuzzTable();
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && document.activeElement === answerInput) {
                e.preventDefault();
                btnSend.click();
            }
            if (e.key === 'Control') {
                e.preventDefault();
                btnBuzz.click();
            }
        });

        window.addEventListener("beforeunload", async () => {
            if (myRoom && myName) await supabase.from("participants").delete().eq("room_code", myRoom).eq("name", myName);
        });

        answerInput.addEventListener('input', function () {
            this.value = this.value.toUpperCase();
        });
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123) e.preventDefault();
            if ((e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
            }
        });
    </script>
</body>

</html>
